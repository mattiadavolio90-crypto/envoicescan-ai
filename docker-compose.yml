# ============================================
# OH YEAH! — Docker Compose
# Ambiente sviluppo locale + produzione
# ============================================

name: ohyeah-hub

services:
  ohyeah:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ohyeah-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - REGENERATE_SECRETS=1
      # WORKER_BASE_URL: imposta solo se avvii il profilo worker (--profile worker)
      # Commentato: Streamlit usa le funzioni locali (nessun worker esterno)
      # - WORKER_BASE_URL=http://worker:8000
    volumes:
      # Hot-reload: monta il codice sorgente per sviluppo locale
      - ./app.py:/app/app.py:ro
      - ./pages:/app/pages:ro
      - ./services:/app/services:ro
      - ./utils:/app/utils:ro
      - ./config:/app/config:ro
      - ./components:/app/components:ro
      - ./static:/app/static:ro
      - ./.streamlit/config.toml:/app/.streamlit/config.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # FASTAPI WORKER (Fase 3 — AI/parsing separato)
  # Scala orizzontalmente indipendente da Streamlit.
  # Attiva solo se necessario: docker-compose up worker
  # ============================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ohyeah-worker
    command: >
      uvicorn services.fastapi_worker:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - WORKER_RELOAD=true
      - WORKER_RATE_LIMIT=30
      - WORKER_RATE_WINDOW_SEC=60
    volumes:
      - ./services:/app/services:ro
      - ./utils:/app/utils:ro
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - worker   # avvio esplicito: docker-compose --profile worker up
