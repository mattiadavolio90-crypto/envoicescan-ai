# ============================================
# OH YEAH! — Docker Compose
# Ambiente sviluppo locale + produzione
# ============================================

services:
  ohyeah:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ohyeah-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - REGENERATE_SECRETS=1
    volumes:
      # Hot-reload: monta il codice sorgente per sviluppo locale
      - ./app.py:/app/app.py:ro
      - ./pages:/app/pages:ro
      - ./services:/app/services:ro
      - ./utils:/app/utils:ro
      - ./config:/app/config:ro
      - ./components:/app/components:ro
      - ./static:/app/static:ro
      - ./.streamlit/config.toml:/app/.streamlit/config.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
