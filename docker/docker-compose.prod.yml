# ============================================================
# ONEFLUX — Docker Compose PRODUZIONE (VPS)
# ============================================================
# Riferimento per un deploy self-hosted. NON e' il path Railway:
# Railway builda docker/Dockerfile e distingue i servizi con lo Start
# Command (vedi docs/DEPLOY_RUNBOOK.md, che e' la fonte autorevole).
#
# Differenze rispetto a docker-compose.yml:
#   - Niente volumi hot-reload (immagine gia' compilata)
#   - WORKER_RELOAD=false
#   - Healthcheck piu' conservativo
#   - API FastAPI e queue worker separati
#
# Il servizio Streamlit (`ohyeah`, porta 8501) e' stato rimosso il
# 17/7/2026: il frontend e' Next.js su Vercel, fuori da questo compose.
#
# Deploy VPS manuale:
#   docker-compose -f docker-compose.prod.yml up -d
# ============================================================

name: oneflux-prod

services:
  worker:
    image: ${DOCKER_IMAGE:-ohyeah-hub}:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ohyeah-worker-prod
    command: >
      uvicorn services.fastapi_worker:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level warning
    # SICUREZZA: nessun port mapping — il worker è raggiungibile SOLO
    # dall'interno della rete Docker (dal container ohyeah via http://worker:8000).
    # Non esporre porta 8000 su internet: il worker usa service_role key e
    # non ha autenticazione JWT sulle route /api/*.
    environment:
      # Supabase (service_role per operazioni backend)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Rate limiting
      - WORKER_RATE_LIMIT=${WORKER_RATE_LIMIT:-60}
      - WORKER_RATE_WINDOW_SEC=${WORKER_RATE_WINDOW_SEC:-60}
      # Queue processor separato: l'API non deve processare inline la coda.
      - ENABLE_INLINE_QUEUE_PROCESSOR=0
      # Uvicorn
      - WORKER_RELOAD=false
      - WORKER_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────
  # QUEUE WORKER DEDICATO (Invoicetronic ingest)
  # ──────────────────────────────────────────
  queue-worker:
    image: ${DOCKER_IMAGE:-ohyeah-hub}:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ohyeah-queue-worker-prod
    command: >
      python worker/run.py
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WORKER_POLL_INTERVAL_SECONDS=${WORKER_POLL_INTERVAL_SECONDS:-15}
      - WORKER_ERROR_BACKOFF_SECONDS=${WORKER_ERROR_BACKOFF_SECONDS:-10}
      - WORKER_MAX_BACKOFF_SECONDS=${WORKER_MAX_BACKOFF_SECONDS:-120}
    restart: unless-stopped

  # ──────────────────────────────────────────
  # NGINX REVERSE PROXY (opzionale — VPS only)
  # Commenta o rimuovi se usi Railway/Render
  # ──────────────────────────────────────────
