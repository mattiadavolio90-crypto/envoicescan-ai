# ============================================
# ONEFLUX — Docker Compose (sviluppo locale)
# ============================================
# Il frontend di produzione è Next.js su Vercel (apps/web/) e NON sta in questo
# compose: si avvia con `npm run dev` (vedi DEV_SERVICES_GUIDE.md).
# Qui resta il solo worker FastAPI, per chi preferisce containerizzarlo invece
# di lanciarlo con `python -m services.fastapi_worker`.
#
# Il servizio `ohyeah` (container Streamlit, porta 8501) è stato rimosso il
# 17/7/2026 insieme al frontend Streamlit: montava `app.py`, `pages/`,
# `components/`, `static/` e `.streamlit/config.toml`, che non esistono più.
#
# Questo file NON è il path di produzione: Railway builda `docker/Dockerfile`
# con uno Start Command per servizio (vedi docs/DEPLOY_RUNBOOK.md).

name: oneflux

services:
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: oneflux-worker
    command: >
      uvicorn services.fastapi_worker:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - WORKER_RELOAD=true
      - WORKER_RATE_LIMIT=30
      - WORKER_RATE_WINDOW_SEC=60
    volumes:
      - ../services:/app/services:ro
      - ../utils:/app/utils:ro
      - ../config:/app/config:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
