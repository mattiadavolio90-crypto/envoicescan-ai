<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>ONEFLUX — galleria 50 loghi</title>
<style>
  body { margin:0; font-family:'Segoe UI',Arial,sans-serif; background:#0d0d0d; color:#eee; }
  header { padding:22px 28px 8px; }
  h1 { font-size:17px; margin:0; font-weight:600; }
  p { font-size:12.5px; opacity:.55; margin:6px 0 0; max-width:820px; line-height:1.5; }
  .toolbar { padding:10px 28px 18px; }
  button { background:#1c1c1c; color:#ddd; border:1px solid #333; border-radius:8px;
           padding:7px 14px; font-size:12px; cursor:pointer; margin-right:8px; }
  button.active { background:#22D3EE; color:#062; border-color:#22D3EE; color:#04323a; font-weight:600; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:2px;
          padding:0 24px 60px; }
  .cell { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
          gap:6px; background:#141414; border:1px solid #1f1f1f; position:relative; }
  .cell .n { position:absolute; top:6px; left:8px; font-size:10px; opacity:.35; }
  .cell .fav { position:absolute; bottom:6px; right:8px; opacity:.5; }
  .cell svg.main { width:62px; height:62px; }
  .neon { color:#22D3EE; }
  body.light { background:#fff; color:#222; }
  body.light .cell { background:#fafafa; border-color:#eee; }
  body.light .neon { color:#0891B2; }
  body.light .toolbar button { background:#f0f0f0; color:#333; border-color:#ddd; }
</style>
</head>
<body>
<header>
  <h1>ONEFLUX — galleria 50 · O + X, nessun "chiudi"</h1>
  <p>Scorri come una tavolozza. Numero in alto a sinistra, mini-favicon in basso a destra di ogni cella (il test piccolo). Segnami i numeri che ti colpiscono (anche solo 3-4) e su quelli lavoro per bene. Usa i pulsanti per sfondo scuro/chiaro.</p>
</header>
<div class="toolbar">
  <button id="dark" class="active" onclick="document.body.classList.remove('light');setActive('dark')">Sfondo scuro</button>
  <button id="light" onclick="document.body.classList.add('light');setActive('light')">Sfondo chiaro</button>
</div>
<div class="grid" id="grid"></div>

<script>
function setActive(id){document.getElementById('dark').classList.toggle('active',id==='dark');document.getElementById('light').classList.toggle('active',id==='light');}

// ogni logo è una funzione che ritorna il contenuto interno dell'svg (viewBox 0 0 100 100), color = currentColor
const S = 'stroke="currentColor" fill="none"';
const logos = [
  // 1 cerchio + X classica
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 L70 70 M70 30 L30 70" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 2 cerchio + X netta
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 L70 70 M70 30 L30 70" ${S} stroke-width="8"/>`,
  // 3 cerchio sottile + X spessa
  `<circle cx="50" cy="50" r="40" ${S} stroke-width="4"/><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="11" stroke-linecap="round"/>`,
  // 4 X che sfonda
  `<circle cx="50" cy="50" r="34" ${S} stroke-width="6"/><path d="M18 18 L82 82 M82 18 L18 82" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 5 O 4 archi + X
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6" stroke-dasharray="37 23" stroke-dashoffset="18.5"/><path d="M28 28 L72 72 M72 28 L28 72" ${S} stroke-width="8"/>`,
  // 6 esagono + X
  `<path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" ${S} stroke-width="6" stroke-linejoin="miter"/><path d="M33 33 L67 67 M67 33 L33 67" ${S} stroke-width="8"/>`,
  // 7 rombo + croce
  `<path d="M50 12 L88 50 L50 88 L12 50 Z" ${S} stroke-width="6" stroke-linejoin="miter"/><path d="M50 30 L50 70 M30 50 L70 50" ${S} stroke-width="8"/>`,
  // 8 ottagono + X
  `<path d="M35 14 L65 14 L86 35 L86 65 L65 86 L35 86 L14 65 L14 35 Z" ${S} stroke-width="6" stroke-linejoin="miter"/><path d="M33 33 L67 67 M67 33 L33 67" ${S} stroke-width="8"/>`,
  // 9 chevron
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 L46 50 L30 70" ${S} stroke-width="8" stroke-linejoin="miter"/><path d="M70 30 L54 50 L70 70" ${S} stroke-width="8" stroke-linejoin="miter"/>`,
  // 10 O piena, X negativa
  `<defs><mask id="m10"><rect width="100" height="100" fill="white"/><path d="M32 32 L68 68 M68 32 L32 68" stroke="black" stroke-width="11" stroke-linecap="round"/></mask></defs><circle cx="50" cy="50" r="40" fill="currentColor" mask="url(#m10)"/>`,
  // 11 doppio cerchio + X
  `<circle cx="50" cy="50" r="40" ${S} stroke-width="3"/><circle cx="50" cy="50" r="32" ${S} stroke-width="3"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="7" stroke-linecap="round"/>`,
  // 12 X grande + O piccola in alto (puntino su X)
  `<path d="M22 22 L78 78 M78 22 L22 78" ${S} stroke-width="9" stroke-linecap="round"/><circle cx="50" cy="50" r="42" ${S} stroke-width="5" opacity=".4"/>`,
  // 13 O quadrata arrotondata + X
  `<rect x="12" y="12" width="76" height="76" rx="22" ${S} stroke-width="6"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 14 cerchio + X solo metà (due quarti opposti)
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 L50 50 M70 70 L50 50" ${S} stroke-width="9" stroke-linecap="round"/>`,
  // 15 spirale-ish: due archi + X
  `<path d="M50 12 A38 38 0 1 1 49 12" ${S} stroke-width="6"/><path d="M32 32 L68 68" ${S} stroke-width="9" stroke-linecap="round"/><path d="M68 32 L32 68" ${S} stroke-width="5" stroke-linecap="round"/>`,
  // 16 esagono + chevron
  `<path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" ${S} stroke-width="6" stroke-linejoin="miter"/><path d="M34 32 L50 50 L34 68" ${S} stroke-width="7" stroke-linejoin="miter"/><path d="M66 32 L50 50 L66 68" ${S} stroke-width="7" stroke-linejoin="miter"/>`,
  // 17 cerchio tratteggio fine + X
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="5" stroke-dasharray="3 6" stroke-linecap="round"/><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="9" stroke-linecap="round"/>`,
  // 18 O aperta in alto + X
  `<path d="M38 16 A38 38 0 1 0 62 16" ${S} stroke-width="6" stroke-linecap="round"/><path d="M34 40 L66 68 M66 40 L34 68" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 19 X formata da 4 triangoli (frecce verso centro)
  `<circle cx="50" cy="50" r="40" ${S} stroke-width="5"/><path d="M50 50 L30 30 M50 50 L70 30 M50 50 L30 70 M50 50 L70 70" ${S} stroke-width="7" stroke-linecap="round"/>`,
  // 20 cerchio + X ruotata leggermente (dinamica)
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><g transform="rotate(12 50 50)"><path d="M30 30 L70 70 M70 30 L30 70" ${S} stroke-width="8" stroke-linecap="round"/></g>`,
  // 21 due semicerchi sfalsati + X
  `<path d="M12 50 A38 38 0 0 1 88 50" ${S} stroke-width="6" stroke-linecap="round"/><path d="M88 50 A38 38 0 0 1 12 50" ${S} stroke-width="6" stroke-linecap="round" transform="translate(0 6)"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="7" stroke-linecap="round"/>`,
  // 22 quadrato netto + X netta
  `<rect x="14" y="14" width="72" height="72" ${S} stroke-width="6"/><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="8"/>`,
  // 23 cerchio + X con punte a freccia
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 L70 70 M70 30 L30 70" ${S} stroke-width="8" stroke-linecap="round"/><path d="M30 30 L38 30 M30 30 L30 38 M70 70 L62 70 M70 70 L70 62" ${S} stroke-width="5" stroke-linecap="round"/>`,
  // 24 O molto spessa + X sottile incisa
  `<circle cx="50" cy="50" r="36" ${S} stroke-width="12"/><path d="M36 36 L64 64 M64 36 L36 64" ${S} stroke-width="4" stroke-linecap="round"/>`,
  // 25 X che diventa cerchio (un tratto curva)
  `<path d="M30 30 Q50 50 70 70" ${S} stroke-width="8" stroke-linecap="round"/><path d="M70 30 Q50 50 30 70" ${S} stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="50" r="40" ${S} stroke-width="4" opacity=".5"/>`,
  // 26 esagono + X che sfonda
  `<path d="M50 14 L82 32 L82 68 L50 86 L18 68 L18 32 Z" ${S} stroke-width="6" stroke-linejoin="miter"/><path d="M22 22 L78 78 M78 22 L22 78" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 27 cerchio + X off-center
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M36 36 L62 62 M62 36 L36 62" ${S} stroke-width="9" stroke-linecap="round"/>`,
  // 28 triangolo + cerchio + X (composito)
  `<circle cx="50" cy="50" r="40" ${S} stroke-width="5"/><path d="M38 38 L62 62 M62 38 L38 62" ${S} stroke-width="8" stroke-linecap="square"/>`,
  // 29 anello spesso pieno + X scavata sottile
  `<defs><mask id="m29"><rect width="100" height="100" fill="white"/><circle cx="50" cy="50" r="26" fill="black"/><path d="M34 34 L66 66 M66 34 L34 66" stroke="white" stroke-width="6"/></mask></defs><circle cx="50" cy="50" r="40" fill="currentColor" mask="url(#m29)"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="6" stroke-linecap="round"/>`,
  // 30 cerchio diviso a metà diagonale + X
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6" stroke-dasharray="120 119" stroke-dashoffset="60"/><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 31 X di due gocce/lacrime
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M32 32 L68 68" ${S} stroke-width="9" stroke-linecap="round"/><path d="M68 32 L32 68" ${S} stroke-width="9" stroke-linecap="round"/><circle cx="32" cy="32" r="2.5" fill="currentColor"/><circle cx="68" cy="68" r="2.5" fill="currentColor"/>`,
  // 32 quadrato ruotato + X piena negativa
  `<defs><mask id="m32"><rect width="100" height="100" fill="white"/><path d="M34 34 L66 66 M66 34 L34 66" stroke="black" stroke-width="10" stroke-linecap="round"/></mask></defs><path d="M50 12 L88 50 L50 88 L12 50 Z" fill="currentColor" mask="url(#m32)"/>`,
  // 33 O ovale orizzontale + X
  `<ellipse cx="50" cy="50" rx="42" ry="32" ${S} stroke-width="6"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 34 cerchio + X grassetto squadrato
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="12" stroke-linecap="square"/>`,
  // 35 cerchio con gap singolo dx + X
  `<path d="M68 18 A38 38 0 1 1 60 14" ${S} stroke-width="6" stroke-linecap="round"/><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 36 doppia X sovrapposta (ombra)
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 L70 70 M70 30 L30 70" ${S} stroke-width="8" stroke-linecap="round" opacity=".35" transform="translate(4 4)"/><path d="M30 30 L70 70 M70 30 L30 70" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 37 esagono pieno + X negativa
  `<defs><mask id="m37"><rect width="100" height="100" fill="white"/><path d="M33 33 L67 67 M67 33 L33 67" stroke="black" stroke-width="10" stroke-linecap="round"/></mask></defs><path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" fill="currentColor" mask="url(#m37)"/>`,
  // 38 cerchio + X formata da linee parallele (binario)
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="5"/><path d="M30 34 L66 70 M34 30 L70 66" ${S} stroke-width="4" stroke-linecap="round"/><path d="M70 34 L34 70 M66 30 L30 66" ${S} stroke-width="4" stroke-linecap="round"/>`,
  // 39 O fatta da 8 punti + X
  `<g ${S} stroke-width="6" stroke-linecap="round"><path d="M50 12 L50 12"/></g><circle cx="50" cy="50" r="38" ${S} stroke-width="6" stroke-dasharray="0.1 19" stroke-linecap="round"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 40 X morbida + O morbida (super round)
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="9"/><path d="M36 36 L64 64 M64 36 L36 64" ${S} stroke-width="9" stroke-linecap="round"/>`,
  // 41 cerchio + freccia che entra (X aperta)
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 L70 70" ${S} stroke-width="8" stroke-linecap="round"/><path d="M70 70 L70 56 M70 70 L56 70" ${S} stroke-width="6" stroke-linecap="round"/>`,
  // 42 O quadrata + X ruotata 45 (croce)
  `<rect x="14" y="14" width="72" height="72" rx="10" ${S} stroke-width="6"/><path d="M50 28 L50 72 M28 50 L72 50" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 43 due archi a C affrontati + X
  `<path d="M40 14 A38 38 0 0 0 40 86" ${S} stroke-width="6" stroke-linecap="round"/><path d="M60 14 A38 38 0 0 1 60 86" ${S} stroke-width="6" stroke-linecap="round"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="7" stroke-linecap="round"/>`,
  // 44 cerchio fine + X enorme che riempie
  `<circle cx="50" cy="50" r="42" ${S} stroke-width="3"/><path d="M22 22 L78 78 M78 22 L22 78" ${S} stroke-width="13" stroke-linecap="round"/>`,
  // 45 ottagono + chevron netti
  `<path d="M35 14 L65 14 L86 35 L86 65 L65 86 L35 86 L14 65 L14 35 Z" ${S} stroke-width="6" stroke-linejoin="miter"/><path d="M34 32 L50 50 L34 68" ${S} stroke-width="7" stroke-linejoin="miter"/><path d="M66 32 L50 50 L66 68" ${S} stroke-width="7" stroke-linejoin="miter"/>`,
  // 46 cerchio + X dove i tratti non si toccano al centro (gap)
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M32 32 L45 45 M68 68 L55 55 M68 32 L55 45 M32 68 L45 55" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 47 O spessa con taglio + X interna fine
  `<circle cx="50" cy="50" r="36" ${S} stroke-width="10" stroke-dasharray="180 30" stroke-dashoffset="20" stroke-linecap="round"/><path d="M38 38 L62 62 M62 38 L38 62" ${S} stroke-width="5" stroke-linecap="round"/>`,
  // 48 cerchio + X con un tratto curvo (flusso)
  `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 C50 40 50 60 70 70" ${S} stroke-width="8" stroke-linecap="round"/><path d="M70 30 C50 40 50 60 30 70" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 49 quadrato 45 (rombo) + X dentro netta
  `<path d="M50 12 L88 50 L50 88 L12 50 Z" ${S} stroke-width="6" stroke-linejoin="miter"/><path d="M38 38 L62 62 M62 38 L38 62" ${S} stroke-width="8" stroke-linecap="round"/>`,
  // 50 minimal: solo X con due punti orbitanti (O implicita)
  `<path d="M30 30 L70 70 M70 30 L30 70" ${S} stroke-width="9" stroke-linecap="round"/><circle cx="50" cy="18" r="3.5" fill="currentColor"/><circle cx="50" cy="82" r="3.5" fill="currentColor"/><circle cx="18" cy="50" r="3.5" fill="currentColor"/><circle cx="82" cy="50" r="3.5" fill="currentColor"/>`,
];

const grid = document.getElementById('grid');
logos.forEach((inner, i) => {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.innerHTML =
    `<span class="n">${i+1}</span>` +
    `<svg class="main neon" viewBox="0 0 100 100">${inner}</svg>` +
    `<svg class="fav neon" width="18" height="18" viewBox="0 0 100 100">${inner}</svg>`;
  grid.appendChild(cell);
});
</script>
</body>
</html>
