<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>ONEFLUX — galleria 51-100 (O+X)</title>
<style>
  body { margin:0; font-family:'Segoe UI',Arial,sans-serif; background:#0d0d0d; color:#eee; }
  header { padding:22px 28px 8px; }
  h1 { font-size:17px; margin:0; font-weight:600; }
  p { font-size:12.5px; opacity:.55; margin:6px 0 0; max-width:820px; line-height:1.5; }
  .toolbar { padding:10px 28px 18px; }
  button { background:#1c1c1c; color:#ddd; border:1px solid #333; border-radius:8px;
           padding:7px 14px; font-size:12px; cursor:pointer; margin-right:8px; }
  button.active { background:#22D3EE; border-color:#22D3EE; color:#04323a; font-weight:600; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:2px; padding:0 24px 60px; }
  .cell { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
          gap:6px; background:#141414; border:1px solid #1f1f1f; position:relative; }
  .cell .n { position:absolute; top:6px; left:8px; font-size:10px; opacity:.35; }
  .cell .fav { position:absolute; bottom:6px; right:8px; opacity:.55; }
  .cell svg.main { width:64px; height:64px; }
  .accent { color:#22D3EE; }
  body.light { background:#fff; color:#222; }
  body.light .cell { background:#fafafa; border-color:#eee; }
  body.light .accent { color:#0891B2; }
  body.light .toolbar button { background:#f0f0f0; color:#333; border-color:#ddd; }
</style>
</head>
<body>
<header>
  <h1>ONEFLUX — galleria loghi 51-100 · O + X geometrici, nessun "chiudi"</h1>
  <p>Seconda serie nello stile galleria. Numero in alto, mini-favicon in basso (test piccolo). Pulsanti per sfondo scuro/chiaro. Segnami i numeri che ti colpiscono.</p>
</header>
<div class="toolbar">
  <button id="dark" class="active" onclick="document.body.classList.remove('light');setA('dark')">Sfondo scuro</button>
  <button id="light" onclick="document.body.classList.add('light');setA('light')">Sfondo chiaro</button>
</div>
<div class="grid" id="grid"></div>
<script>
function setA(id){document.getElementById('dark').classList.toggle('active',id==='dark');document.getElementById('light').classList.toggle('active',id==='light');}
const S='stroke="currentColor" fill="none"';
const F='fill="currentColor"';
const logos=[
 // 51 O esagono allungato + X
 `<path d="M50 12 L84 32 L84 68 L50 88 L16 68 L16 32 Z" ${S} stroke-width="5" stroke-linejoin="round"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="8" stroke-linecap="round"/>`,
 // 52 cerchio doppio tratto + X centrata
 `<circle cx="50" cy="50" r="40" ${S} stroke-width="4"/><circle cx="50" cy="50" r="40" ${S} stroke-width="4" stroke-dasharray="10 8"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="8" stroke-linecap="round"/>`,

 // 55 X spessa + cerchio sottile esterno staccato
 `<circle cx="50" cy="50" r="44" ${S} stroke-width="3"/><path d="M30 30 L70 70 M70 30 L30 70" ${S} stroke-width="13" stroke-linecap="round"/>`,
 // 56 O quadrata super-arrotondata + X
 `<rect x="14" y="14" width="72" height="72" rx="30" ${S} stroke-width="6"/><path d="M36 36 L64 64 M64 36 L36 64" ${S} stroke-width="8" stroke-linecap="round"/>`,
 // 57 cerchio + X con centro vuoto (4 segmenti corti)
 `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 L42 42 M70 70 L58 58 M70 30 L58 42 M30 70 L42 58" ${S} stroke-width="8" stroke-linecap="round"/>`,

 // 59 O fatta da 12 trattini + X
 `<circle cx="50" cy="50" r="38" ${S} stroke-width="6" stroke-dasharray="2 14" stroke-linecap="round"/><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="8" stroke-linecap="round"/>`,
 // 60 X come due V incastrate + cerchio
 `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M32 34 L50 56 L68 34" ${S} stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M32 66 L50 44 L68 66" ${S} stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>`,

 // 62 rombo arrotondato + X
 `<path d="M50 14 Q86 50 50 86 Q14 50 50 14 Z" ${S} stroke-width="6"/><path d="M38 38 L62 62 M62 38 L38 62" ${S} stroke-width="8" stroke-linecap="round"/>`,
 // 63 cerchio + X con tratti che escono ai 4 lati
 `<circle cx="50" cy="50" r="34" ${S} stroke-width="6"/><path d="M16 16 L84 84 M84 16 L16 84" ${S} stroke-width="7" stroke-linecap="round"/>`,
 // 64 O pentagono + X
 `<path d="M50 12 L86 40 L72 84 L28 84 L14 40 Z" ${S} stroke-width="5" stroke-linejoin="round"/><path d="M36 40 L64 68 M64 40 L36 68" ${S} stroke-width="8" stroke-linecap="round"/>`,
 // 65 cerchio + X ruotata 22°
 `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><g transform="rotate(22 50 50)"><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="8" stroke-linecap="round"/></g>`,
 // 66 due semicerchi + X (O divisa orizz)
 `<path d="M14 50 A36 36 0 0 1 86 50" ${S} stroke-width="6" stroke-linecap="round"/><path d="M14 50 A36 36 0 0 0 86 50" ${S} stroke-width="6" stroke-linecap="round"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="7" stroke-linecap="round"/>`,
 // 67 X grande con O piccola al centro come perno
 `<path d="M24 24 L76 76 M76 24 L24 76" ${S} stroke-width="9" stroke-linecap="round"/><circle cx="50" cy="50" r="13" stroke="currentColor" stroke-width="6" fill="#0d0d0d"/>`,
 // 68 cerchio + X con bracci a spessore decrescente
 `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M32 32 L50 50" ${S} stroke-width="10" stroke-linecap="round"/><path d="M50 50 L68 68" ${S} stroke-width="5" stroke-linecap="round"/><path d="M68 32 L50 50" ${S} stroke-width="10" stroke-linecap="round"/><path d="M50 50 L32 68" ${S} stroke-width="5" stroke-linecap="round"/>`,
 // 69 O triangolo arrotondato + X
 `<path d="M50 14 Q88 76 50 76 Q12 76 50 14Z" ${S} stroke-width="6" stroke-linejoin="round"/><path d="M38 44 L62 68 M62 44 L38 68" ${S} stroke-width="7" stroke-linecap="round"/>`,

 `<circle cx="50" cy="50" r="40" ${S} stroke-width="5"/><circle cx="50" cy="50" r="26" ${S} stroke-width="5"/><path d="M40 40 L60 60 M60 40 L40 60" ${S} stroke-width="6" stroke-linecap="round"/>`,
 // 71 X formata da 4 frecce verso esterno + cerchio
 `<circle cx="50" cy="50" r="40" ${S} stroke-width="5"/><path d="M50 50 L32 32 M32 32 L42 32 M32 32 L32 42" ${S} stroke-width="6" stroke-linecap="round"/><path d="M50 50 L68 32 M68 32 L58 32 M68 32 L68 42" ${S} stroke-width="6" stroke-linecap="round"/><path d="M50 50 L32 68 M32 68 L42 68 M32 68 L32 58" ${S} stroke-width="6" stroke-linecap="round"/><path d="M50 50 L68 68 M68 68 L58 68 M68 68 L68 58" ${S} stroke-width="6" stroke-linecap="round"/>`,

 // 74 O con gap a 45° + X allineata al gap
 `<circle cx="50" cy="50" r="38" ${S} stroke-width="6" stroke-dasharray="40 16" stroke-dashoffset="20" transform="rotate(45 50 50)"/><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="8" stroke-linecap="round"/>`,
 // 75 X piena solida + anello sottile
 `<circle cx="50" cy="50" r="42" ${S} stroke-width="3"/><path d="M30 30 L70 70 M70 30 L30 70" ${S} stroke-width="14" stroke-linecap="square"/>`,

 // 77 cerchio + X minimale fine elegante
 `<circle cx="50" cy="50" r="40" ${S} stroke-width="3.5"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="4" stroke-linecap="round"/>`,
 // 78 esagono + X chevron
 `<path d="M50 12 L84 31 L84 69 L50 88 L16 69 L16 31Z" ${S} stroke-width="5"/><path d="M34 32 L50 50 L34 68" ${S} stroke-width="7" stroke-linejoin="round"/><path d="M66 32 L50 50 L66 68" ${S} stroke-width="7" stroke-linejoin="round"/>`,
 // 79 O quadrato + X che esce dagli angoli del quadrato
 `<rect x="22" y="22" width="56" height="56" rx="6" ${S} stroke-width="6"/><path d="M14 14 L86 86 M86 14 L14 86" ${S} stroke-width="7" stroke-linecap="round"/>`,
 // 80 cerchio con 4 tacche + X
 `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M50 8 L50 18 M50 82 L50 92 M8 50 L18 50 M82 50 L92 50" ${S} stroke-width="5" stroke-linecap="round"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="7" stroke-linecap="round"/>`,
 // 81 X enorme che esce + cerchio interno piccolo
 `<path d="M14 14 L86 86 M86 14 L14 86" ${S} stroke-width="9" stroke-linecap="round"/><circle cx="50" cy="50" r="16" stroke="currentColor" stroke-width="6" fill="#0d0d0d"/>`,
 // 82 O cuore-ish stilizzato geometrico + X
 `<path d="M50 80 L20 48 A16 16 0 1 1 50 36 A16 16 0 1 1 80 48 Z" ${S} stroke-width="5"/><path d="M40 44 L60 60 M60 44 L40 60" ${S} stroke-width="6" stroke-linecap="round"/>`,
 // 83 cerchio mezzo tratteggiato mezzo pieno + X
 `<path d="M50 12 A38 38 0 0 1 50 88" ${S} stroke-width="6"/><path d="M50 12 A38 38 0 0 0 50 88" ${S} stroke-width="6" stroke-dasharray="3 7" stroke-linecap="round"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="7" stroke-linecap="round"/>`,
 // 84 O esagono ruotato (punta su) + X
 `<path d="M50 12 L86 32 L86 68 L50 88 L14 68 L14 32 Z" ${S} stroke-width="5" transform="rotate(30 50 50)"/><path d="M34 34 L66 66 M66 34 L34 66" ${S} stroke-width="8" stroke-linecap="round"/>`,
 // 85 cerchio + X formata da 2 boomerang
 `<circle cx="50" cy="50" r="38" ${S} stroke-width="5"/><path d="M30 30 L50 42 L70 30" ${S} stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><path d="M30 70 L50 58 L70 70" ${S} stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>`,
 // 86 doppio anello offset + X (profondità)
 `<circle cx="46" cy="46" r="34" ${S} stroke-width="5" opacity=".45"/><circle cx="54" cy="54" r="34" ${S} stroke-width="6"/><path d="M40 40 L68 68 M68 40 L40 68" ${S} stroke-width="7" stroke-linecap="round"/>`,
 // 87 O super spessa monoline + X stesso peso
 `<circle cx="50" cy="50" r="34" ${S} stroke-width="11"/><path d="M38 38 L62 62 M62 38 L38 62" ${S} stroke-width="11" stroke-linecap="round"/>`,

 `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M30 30 L42 42 M70 70 L58 58 M70 30 L58 42 M30 70 L42 58" ${S} stroke-width="8" stroke-linecap="square"/><path d="M50 42 L58 50 L50 58 L42 50 Z" ${S} stroke-width="3"/>`,
 // 89 O a doppio arco aperto sx-dx + X
 `<path d="M50 12 A38 38 0 0 1 50 88" ${S} stroke-width="7" stroke-linecap="round"/><path d="M30 34 L70 66 M70 34 L30 66" ${S} stroke-width="7" stroke-linecap="round"/>`,
 // 90 cerchio puntinato denso + X netta
 `<circle cx="50" cy="50" r="40" ${S} stroke-width="6" stroke-dasharray="1 7" stroke-linecap="round"/><path d="M32 32 L68 68 M68 32 L32 68" ${S} stroke-width="9" stroke-linecap="round"/>`,
 // 91 O quadrata diagonale (rombo arrotond.) + X dritta +
 `<path d="M50 12 Q88 50 50 88 Q12 50 50 12Z" ${S} stroke-width="6"/><path d="M50 30 L50 70 M30 50 L70 50" ${S} stroke-width="8" stroke-linecap="round"/>`,
 // 92 cerchio + X una linea continua a Z
 `<circle cx="50" cy="50" r="38" ${S} stroke-width="6"/><path d="M32 32 L68 32 L32 68 L68 68" ${S} stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>`,
 // 93 O ellisse verticale + X
 `<ellipse cx="50" cy="50" rx="30" ry="40" ${S} stroke-width="6"/><path d="M36 34 L64 66 M64 34 L36 66" ${S} stroke-width="7" stroke-linecap="round"/>`,

const grid=document.getElementById('grid');
logos.forEach((inner,i)=>{const c=document.createElement('div');c.className='cell';
 c.innerHTML=`<span class="n">${i+51}</span><svg class="main accent" viewBox="0 0 100 100">${inner}</svg><svg class="fav accent" width="18" height="18" viewBox="0 0 100 100">${inner}</svg>`;
