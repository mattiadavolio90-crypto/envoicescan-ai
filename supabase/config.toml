# Supabase project configuration
# Documentazione: https://supabase.com/docs/guides/local-development
#
# Questo file è necessario per "supabase functions serve" senza passare
# --project-ref ad ogni comando.

project_id = "vthikmfpywilukizputn"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# ─── Edge Functions ───────────────────────────────────────────────────────────
# verify_jwt FALSE su entrambi i webhook: chi li chiama (Invoicetronic, Gmail/Apps
# Script) NON manda un JWT Supabase. L'autenticazione vera e' nel codice:
#   - invoicetronic-webhook → firma HMAC-SHA256 (header Invoicetronic-Signature) + anti-replay
#   - ricavi-email-webhook  → token segreto nell'header/body verificato dalla function
# Se verify_jwt restasse TRUE, Supabase rifiuterebbe 401 PRIMA del codice e le fatture
# SDI / le email ricavi rimbalzerebbero in silenzio. Dichiarato qui per renderlo
# riproducibile e impedire drift dal dashboard.
[functions.invoicetronic-webhook]
verify_jwt = false

[functions.ricavi-email-webhook]
verify_jwt = false
