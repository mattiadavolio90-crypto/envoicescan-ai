name: Uptime Check - OH YEAH!

on:
  schedule:
    # Ogni 5 minuti
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permette di avviarlo manuale per testarlo

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Controlla se l'app è online
        id: ping
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://ohyeah.streamlit.app/)
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "Risposta HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "down=true" >> $GITHUB_OUTPUT
          else
            echo "down=false" >> $GITHUB_OUTPUT
          fi

      - name: Invia email di allerta via Brevo
        if: steps.ping.outputs.down == 'true'
        run: |
          curl -s -X POST https://api.brevo.com/v3/smtp/email \
            -H "api-key: ${{ secrets.BREVO_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "sender": {"name": "OH YEAH! Monitor", "email": "noreply@ohyeah.it"},
              "to": [{"email": "mattiadavolio90@gmail.com", "name": "Mattia"}],
              "subject": "🚨 OH YEAH! è offline",
              "htmlContent": "<h2>⚠️ Attenzione</h2><p>L'\''app <strong>OH YEAH!</strong> non risponde.</p><p>Codice HTTP ricevuto: <strong>${{ steps.ping.outputs.http_code }}</strong></p><p>URL: <a href=\"https://ohyeah.streamlit.app/\">https://ohyeah.streamlit.app/</a></p><p>Controlla subito su <a href=\"https://share.streamlit.io\">Streamlit Cloud</a>.</p>"
            }'
