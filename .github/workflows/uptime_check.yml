name: Uptime Check - ONEFLUX

on:
  schedule:
    # Ogni 15 minuti
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permette di avviarlo manuale per testarlo

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Controlla se l'app è online
        id: ping
        run: |
          # || echo "000" evita che un timeout (curl exit 28) faccia crashare lo step
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -L \
            --max-time 60 \
            --connect-timeout 15 \
            https://app.oneflux.it/ || echo "000")
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" = "200" ]; then
            echo "down=false" >> $GITHUB_OUTPUT
            echo "✅ App online (HTTP 200)"
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "down=true" >> $GITHUB_OUTPUT
            echo "❌ Timeout o connessione rifiutata (nessuna risposta entro 60s)"
          else
            echo "down=true" >> $GITHUB_OUTPUT
            echo "❌ App offline (HTTP $HTTP_CODE)"
          fi

      - name: Retry dopo pausa (verifica transitoria)
        if: steps.ping.outputs.down == 'true'
        run: |
          echo "🔄 Attendo 30s e riprovo..."
          sleep 30
          WAKE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -L \
            --max-time 60 \
            --connect-timeout 15 \
            https://app.oneflux.it/ || echo "000")
          echo "Risposta dopo wake-up: $WAKE_CODE"
          if [ "$WAKE_CODE" = "200" ]; then
            echo "woke_up=true" >> $GITHUB_OUTPUT
            echo "✅ App si è svegliata con successo!"
          else
            echo "woke_up=false" >> $GITHUB_OUTPUT
            echo "⚠️ Ancora non risponde dopo il wake-up (HTTP $WAKE_CODE)"
          fi
        id: wakeup

      - name: Invia email di allerta via Brevo
        if: steps.ping.outputs.down == 'true' && steps.wakeup.outputs.woke_up != 'true'
        run: |
          HTTP_CODE="${{ steps.ping.outputs.http_code }}"
          if [ "$HTTP_CODE" = "000" ]; then
            DETAIL="Timeout: nessuna risposta entro 60 secondi"
          else
            DETAIL="Codice HTTP ricevuto: <strong>$HTTP_CODE</strong>"
          fi
          curl -s -X POST https://api.brevo.com/v3/smtp/email \
            -H "api-key: ${{ secrets.BREVO_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"sender\": {\"name\": \"ONEFLUX Monitor\", \"email\": \"agent@oneflux.it\"},
              \"to\": [{\"email\": \"md@oneflux.it\", \"name\": \"Mattia\"}],
              \"subject\": \"🚨 ONEFLUX è offline\",
              \"htmlContent\": \"<h2>⚠️ Attenzione</h2><p>L'app <strong>ONEFLUX</strong> non risponde.</p><p>$DETAIL</p><p>URL: <a href='https://app.oneflux.it/'>https://app.oneflux.it/</a></p><p>Controlla su <a href='https://vercel.com'>Vercel Dashboard</a> per lo stato del deploy.</p>\"
            }"

      # Canale ridondante e indipendente dall'email: se Brevo è giù o l'email
      # finisce in spam, Telegram arriva comunque come push sul telefono.
      # Se i secrets Telegram non sono configurati, curl fallisce silenziosamente
      # (nessuna guardia esplicita: l'email resta comunque la garanzia primaria).
      - name: Invia alert Telegram
        if: steps.ping.outputs.down == 'true' && steps.wakeup.outputs.woke_up != 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram non configurato (TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID mancanti), salto."
            exit 0
          fi
          HTTP_CODE="${{ steps.ping.outputs.http_code }}"
          if [ "$HTTP_CODE" = "000" ]; then
            DETAIL="Timeout: nessuna risposta entro 60s"
          else
            DETAIL="HTTP $HTTP_CODE"
          fi
          MSG=$(printf '🚨 ONEFLUX è offline\n%s\nhttps://app.oneflux.it/\nRunbook: DOCUMENTAZIONE/RUNBOOK_INCIDENTI.md' "$DETAIL")
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}"
