name: DB Backup - ONEFLUX

# ═══════════════════════════════════════════════════════════════════════════════
# Backup indipendente del database Supabase, verificato assente il 6/7/2026:
# il progetto è sul piano Free (niente PITR), e nel repo non esisteva alcun
# meccanismo di dump/export — il README dichiarava "Point in Time Recovery,
# continuo" ma è una descrizione dello stato desiderato (piano Pro), mai
# messa in pratica. Con clienti reali attivi dall'1/7, un comando distruttivo
# (bug, errore umano) su fatture/margini/ricavi sarebbe oggi irrecuperabile.
#
# pg_dump in formato custom (-Fc, compresso, ripristinabile con pg_restore)
# caricato come artifact GitHub — indipendente dal piano Supabase, protegge
# anche da un eventuale problema lato Supabase stesso.
#
# GITHUB SECRET richiesto (da aggiungere, non ancora presente al 6/7/2026):
#   SUPABASE_DB_URL   connection string in modalità "Session pooler" (porta
#                     5432, host aws-*.pooler.supabase.com) — Project Settings
#                     → Database → Connect → "Session pooler". OBBLIGATORIO
#                     questa modalità e non la connessione diretta: quella è
#                     IPv6-only sul piano Free e GitHub Actions (runner
#                     ubuntu-latest) e' IPv4-only, la connessione fallirebbe.
#                     Contiene la password del DB: mai loggarla né stamparla
#                     in chiaro negli step.
#
# COSTO: 1 run/giorno, pochi secondi (DB piccolo, <50MB all'8/6). Artifact
# storage GitHub free tier: 500MB totali, ampiamente sufficiente. Retention
# 14 giorni: oltre quella finestra l'artifact scade automaticamente.
# ═══════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    # Ogni giorno alle 03:11 UTC (~05:11 CEST) — fuori orario clienti.
    - cron: '11 3 * * *'
  workflow_dispatch: # avvio manuale per test

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Verifica secret presente
        id: check-secret
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "⚠️ SUPABASE_DB_URL non configurato — backup saltato. Vedi commento in testa al file per come aggiungerlo."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Installa client PostgreSQL 17
        # Il repo Ubuntu di default non ha il pacchetto versionato -17 (resta su
        # pg_dump 16), che rifiuta di collegarsi a un server 17.x ("server version
        # mismatch"). Serve il repo APT ufficiale PostgreSQL per la v17 giusta.
        # L'update e' limitato al solo repo appena aggiunto (Dir::Etc::sourcelist)
        # perche' il runner GitHub-hosted ha altri repo preinstallati (es. Azure
        # CLI) che falliscono saltuariamente la verifica firma e farebbero fallire
        # un "apt-get update" globale anche se PostgreSQL non c'entra.
        if: steps.check-secret.outputs.configured == 'true'
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq -o Dir::Etc::sourcelist="sources.list.d/pgdg.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0"
          sudo apt-get install -y -qq postgresql-client-17

      - name: Esegui pg_dump
        if: steps.check-secret.outputs.configured == 'true'
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          STAMP=$(date -u +%Y%m%d_%H%M%S)
          echo "STAMP=$STAMP" >> $GITHUB_ENV
          # -Fc: formato custom compresso, ripristinabile selettivamente con
          # pg_restore. --no-owner/--no-privileges: evita di portarsi dietro
          # ruoli specifici dell'istanza Supabase che non esistono altrove.
          # Percorso esplicito: update-alternatives gestisce solo psql, non
          # pg_dump — "pg_dump" nudo continuerebbe a risolvere alla v16
          # preinstallata sul runner (mismatch con il server 17.x di Supabase).
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" -Fc --no-owner --no-privileges -f "oneflux_backup_${STAMP}.dump"
          ls -lh "oneflux_backup_${STAMP}.dump"

      - name: Carica come artifact
        if: steps.check-secret.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: oneflux-db-backup-${{ env.STAMP }}
          path: oneflux_backup_${{ env.STAMP }}.dump
          retention-days: 14
          compression-level: 0 # già compresso da pg_dump -Fc, evita doppio lavoro
