name: Worker Latency Check - ONEFLUX

# ═══════════════════════════════════════════════════════════════════════════════
# Rileva il worker LENTO, non solo il worker GIÙ.
#
# Causa che questo monitor previene (incidente 2/7/2026): il worker Railway
# restava HTTP 200 su /health ma sotto carico (Admin + più clienti insieme) le
# query autenticate (/api/auth/me, Home) potevano superare il timeout SSR (12s),
# mostrando "Servizio momentaneamente non raggiungibile" ai clienti pur essendo
# il worker "vivo" secondo un check binario su/giù. uptime_check.yml (che guarda
# solo Vercel) non intercetta questo scenario: qui misuriamo la LATENZA reale
# del worker Railway.
#
# Soglia: /health non fa query DB, deve rispondere in poche centinaia di ms.
# Se supera LATENCY_THRESHOLD_MS anche solo su un ping, è un segnale che il
# threadpool del worker è sotto pressione — vedi anche la tab Admin
# "Salute worker" (/api/admin/sistema/salute-worker) per il dettaglio per rotta.
#
# GITHUB SECRETS richiesti: BREVO_API_KEY (già presente), TELEGRAM_BOT_TOKEN,
# TELEGRAM_CHAT_ID (opzionali: se assenti l'alert Telegram viene solo saltato).
#
# COSTO: 1 run/10 min, < 5s ciascuno. GitHub Actions free tier ampiamente coperto.
# ═══════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  WORKER_URL: 'https://worker-production-a552.up.railway.app'
  LATENCY_THRESHOLD_MS: '3000'

jobs:
  check-latency:
    runs-on: ubuntu-latest
    steps:
      - name: Misura latenza /health del worker
        id: check
        run: |
          START_MS=$(date +%s%3N)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 --connect-timeout 10 \
            "${WORKER_URL}/health" || echo "000")
          END_MS=$(date +%s%3N)
          ELAPSED_MS=$((END_MS - START_MS))

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "elapsed_ms=$ELAPSED_MS" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "problema=down" >> $GITHUB_OUTPUT
            echo "❌ Worker non risponde correttamente (HTTP $HTTP_CODE) — lo intercetta anche uptime_check"
          elif [ "$ELAPSED_MS" -gt "$LATENCY_THRESHOLD_MS" ]; then
            echo "problema=lento" >> $GITHUB_OUTPUT
            echo "⚠️ Worker lento: ${ELAPSED_MS}ms > soglia ${LATENCY_THRESHOLD_MS}ms"
          else
            echo "problema=" >> $GITHUB_OUTPUT
            echo "✅ Worker sano: ${ELAPSED_MS}ms"
          fi

      - name: Invia alert Telegram (worker lento)
        if: steps.check.outputs.problema == 'lento'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ELAPSED: ${{ steps.check.outputs.elapsed_ms }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram non configurato, salto."
            exit 0
          fi
          MSG=$(printf "⚠️ ONEFLUX worker LENTO\n/health ha impiegato %sms (soglia %sms)\nI clienti potrebbero vedere 'Servizio non raggiungibile'.\nControlla Admin > Clienti > Salute worker per il dettaglio per rotta.\nRunbook: DOCUMENTAZIONE/RUNBOOK_INCIDENTI.md" "$ELAPSED" "$LATENCY_THRESHOLD_MS")
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}"

      - name: Invia email di allerta via Brevo (worker lento)
        if: steps.check.outputs.problema == 'lento'
        env:
          ELAPSED: ${{ steps.check.outputs.elapsed_ms }}
        run: |
          # Vedi nota in uptime_check.yml: senza -w il passo resta verde anche se
          # l'email non parte, e l'allerta diventa una finzione.
          RESP=$(curl -s -w "\n%{http_code}" -X POST https://api.brevo.com/v3/smtp/email \
            -H "api-key: ${{ secrets.BREVO_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"sender\": {\"name\": \"ONEFLUX Monitor\", \"email\": \"agent@oneflux.it\"},
              \"to\": [{\"email\": \"md@oneflux.it\", \"name\": \"Mattia\"}],
              \"subject\": \"⚠️ ONEFLUX worker lento (${ELAPSED}ms)\",
              \"htmlContent\": \"<h2>⚠️ Worker Railway sotto pressione</h2><p><code>/health</code> ha impiegato <strong>${ELAPSED}ms</strong> (soglia ${{ env.LATENCY_THRESHOLD_MS }}ms).</p><p>I clienti potrebbero vedere la schermata 'Servizio momentaneamente non raggiungibile'.</p><p>Controlla <a href='https://app.oneflux.it/admin/clienti'>Admin &gt; Clienti &gt; Salute worker</a> per il dettaglio per rotta (p50/p95).</p>\"
            }")
          BREVO_CODE=$(echo "$RESP" | tail -n1)
          if [ "$BREVO_CODE" != "201" ] && [ "$BREVO_CODE" != "202" ]; then
            echo "::error::Alert email NON inviato (Brevo HTTP $BREVO_CODE). Rigenera BREVO_API_KEY su Brevo e aggiornala nei GitHub Secrets."
            echo "$RESP" | head -n-1
            exit 1
          fi
          echo "Alert email inviato (Brevo HTTP $BREVO_CODE)."
