name: Tests

on:
  push:
    branches:
      - main
      - progetto
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Run pytest
        # WORKER_DEV_MODE=1: salta il guard fail-closed su WORKER_SECRET_KEY
        # (i test importano services.fastapi_worker, che senza la chiave si
        # rifiuterebbe di caricare). I moduli pesanti sono comunque mockati dal
        # conftest, quindi non servono credenziali reali in CI.
        env:
          WORKER_DEV_MODE: '1'
        run: python -m pytest tests/ -q

  deno-test:
    # Test delle Edge Functions (Deno): auth HMAC + routing multi-sede del webhook
    # fatture. È il path critico del go-live e non gira in pytest.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno unit tests (Edge Functions)
        # Solo i file *_test.ts (unit). Esclude test.ts (script di integration
        # manuale che richiede `supabase functions serve` + WEBHOOK_SECRET).
        run: deno test --allow-env --allow-net supabase/functions/**/*_test.ts
